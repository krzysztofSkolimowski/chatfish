name: Backend CI

on:
  push:
    paths:
      - "backend/**"
      - "scripts/ci/backend-*.sh"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "scripts/ci/backend-*.sh"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: golang:1.26
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: bash scripts/ci/backend-test.sh
      - name: Vet & format
        run: bash scripts/ci/backend-vet.sh

  lint:
    runs-on: ubuntu-latest
    container:
      image: golangci/golangci-lint:latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint
        run: bash scripts/ci/backend-lint.sh

  docker:
    runs-on: ubuntu-latest
    needs: [test, lint]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: bash scripts/ci/docker-build.sh
