<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatfish — Mockup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c2733;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 270px;
      background: #17212b;
      border-right: 1px solid #0d1821;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 14px 16px;
      font-size: 18px;
      font-weight: 600;
      border-bottom: 1px solid #0d1821;
      flex-shrink: 0;
    }
    .chat-list {
      overflow-y: auto;
      flex: 1;
    }
    .chat-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .chat-item.active { background: #2b5278; }
    .chat-item:hover:not(.active) { background: #1f2e3d; }

    /* Avatar — shows photo if available, else initials */
    .avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px; flex-shrink: 0;
      overflow: hidden;
      background: #2b5278;
    }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover;
    }

    .chat-info { flex: 1; overflow: hidden; }
    .chat-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chat-preview { font-size: 12px; color: #8a9bb0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    /* ── Main chat area ── */
    .chat-area {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── CHATFISH: Score bar (chess.com style) ── */
    .score-bar-container {
      width: 40px;
      background: #17212b;
      border-right: 1px solid #0d1821;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      flex-shrink: 0;
    }
    .score-display {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .score-track {
      flex: 1;
      width: 18px;
      background: #0d1821;
      border-radius: 9px;
      position: relative;
      overflow: hidden;
    }
    .score-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 9px;
      transition: height 0.7s cubic-bezier(0.4, 0, 0.2, 1),
                  background 0.7s ease;
    }
    .score-zero-line {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 2px;
      background: #2b5278;
      transform: translateY(-50%);
      z-index: 2;
    }
    .score-label {
      font-size: 14px;
      line-height: 1;
    }

    /* ── Chat ── */
    .chat-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      padding: 12px 16px;
      background: #17212b;
      border-bottom: 1px solid #0d1821;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .chat-header .avatar { width: 38px; height: 38px; font-size: 13px; }
    .chat-header-info .name { font-size: 15px; font-weight: 600; }
    .chat-header-info .status { font-size: 12px; color: #8a9bb0; }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .message {
      max-width: 68%;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }
    .message.incoming {
      background: #17212b;
      border: 1px solid #1f2e3d;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .message.outgoing {
      background: #2b5278;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message .time {
      font-size: 10px;
      color: #8a9bb0;
      margin-top: 4px;
      text-align: right;
    }

    /* ── Suggestions ── */
    .suggestions-strip {
      background: #0f1923;
      border-top: 1px solid #2b5278;
      padding: 8px 12px;
      flex-shrink: 0;
    }
    .suggestions-label {
      font-size: 10px;
      color: #4db8ff;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .suggestions-label::before { content: "🐟"; font-size: 12px; }
    .suggestions-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .suggestion-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #17212b;
      border: 1px solid #2b5278;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      user-select: none;
    }
    .suggestion-chip:hover { background: #2b5278; border-color: #4db8ff; }
    .suggestion-chip:active { background: #3a6a9a; }
    .chip-delta {
      font-size: 11px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px;
      background: #0d1821;
    }
    .chip-delta.positive { color: #4caf82; }
    .chip-delta.neutral  { color: #f0a500; }
    .chip-delta.negative { color: #e05555; }

    /* ── Input ── */
    .input-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      background: #17212b;
      border-top: 1px solid #0d1821;
      flex-shrink: 0;
    }
    .input-bar input {
      flex: 1;
      background: #1c2733;
      border: 1px solid #2b5278;
      border-radius: 20px;
      padding: 9px 16px;
      color: #e0e0e0; font-size: 14px; outline: none;
    }
    .input-bar input::placeholder { color: #4a5a6a; }
    .input-bar button {
      width: 36px; height: 36px; border-radius: 50%;
      border: none; background: #2b5278; color: #fff;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .input-bar button:hover { background: #3a6a9a; }

    /* ── CHATFISH: Message score bar (right side) ── */
    .msg-score-bar {
      width: 40px;
      background: #17212b;
      border-right: 1px solid #0d1821;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 0;
      gap: 8px;
      flex-shrink: 0;
    }
    .msg-score-bar .score-label { font-size: 14px; line-height: 1; }
    .msg-score-bar .score-display { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; color: #4a5a6a; }
    .msg-score-bar .score-track {
      flex: 1; width: 18px;
      background: #0d1821;
      border-radius: 9px;
      position: relative;
      overflow: hidden;
    }
    .msg-score-bar .score-fill {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      border-radius: 9px;
      height: 50%;
      background: #2b5278;
      transition: height 0.25s ease, background 0.25s ease;
    }
    .msg-score-bar .score-zero-line {
      position: absolute;
      top: 50%; left: 0; right: 0;
      height: 2px;
      background: #2b5278;
      transform: translateY(-50%);
      z-index: 2;
    }
  </style>
</head>

          { text: "bardzo dobry 😊 co teraz czytasz?", delta: +0.9 },
          { text: "może powinniśmy to omówić przy kawie — masz jakieś miejsce w warszawie? ☕", delta: +1.3 },
          { text: "haha może 😄", delta: -0.2 },
        ]
      },
      {
        name: "Wróbelek",
        initials: "W",
        color: "#4f1a7a",
        photo: "photos/10.png",
        status: "ostatnio widziana o 17:33",
        score: 0.9,
        messages: [
          { dir: "incoming", text: "hej", time: "17:00" },
          { dir: "incoming", text: "twój opis na profilu to \"lubię muzykę i podróże\"", time: "17:00" },
          { dir: "incoming", text: "to chyba każdy? 😄", time: "17:00" },
          { dir: "outgoing", text: "hahaha no dobra masz rację 😂", time: "17:02" },
          { dir: "outgoing", text: "co chciałabyś żebym napisał", time: "17:02" },
          { dir: "incoming", text: "cokolwiek prawdziwego", time: "17:03" },
          { dir: "incoming", text: "coś co cię wyróżnia", time: "17:03" },
          { dir: "outgoing", text: "buduję aplikację która ocenia na bieżąco czy rozmowa idzie dobrze czy źle 😄", time: "17:05" },
          { dir: "incoming", text: "...czekaj to serio?", time: "17:06" },
          { dir: "incoming", text: "to jest albo bardzo fajne albo trochę przerażające, jeszcze nie wiem 😂", time: "17:07" },

          { text: "serio 😄 i ta rozmowa aktualnie idzie dobrze, btw", delta: +1.1 },
          { text: "bardzo serio — chcesz zobaczyć jak działa?", delta: +0.8 },
          { text: "haha trochę obu 😏", delta: +0.3 },
        ]
      },
    ];

    function avatarHTML(chat, size) {
      if (chat.photo) {
        return `<div class="avatar" style="width:${size}px;height:${size}px">
                  <img src="${chat.photo}" alt="${chat.name}" />
                </div>`;
      }
      return `<div class="avatar" style="background:${chat.color};width:${size}px;height:${size}px;font-size:${size < 40 ? 13 : 15}px">
                ${chat.initials}
              </div>`;
    }

    function renderScoreBar(score) {
      const clamped = Math.max(-5, Math.min(5, score));
      const fillPct  = 50 + (clamped / 5) * 45;
      const fill     = document.getElementById('score-fill');
      const display  = document.getElementById('score-display');
      fill.style.height = fillPct + '%';
      if (clamped >= 0) {
        fill.style.background = 'linear-gradient(to top, #8b0000, #ff4500, #ffa500)';
        display.style.color   = '#ffa500';
        display.textContent   = '+' + clamped.toFixed(1);
      } else {
        fill.style.background = 'linear-gradient(to top, #023e8a, #0077b6, #90e0ef)';
        display.style.color   = '#90e0ef';
        display.textContent   = clamped.toFixed(1);
      }
    }

    function deltaClass(d)  { return d >= 0.4 ? 'positive' : d >= 0 ? 'neutral' : 'negative'; }
    function deltaLabel(d)  { return (d >= 0 ? '+' : '') + d.toFixed(1); }

    function render(idx) {
      const chat = chats[idx];

      document.getElementById('chat-header').innerHTML = `
        ${avatarHTML(chat, 38)}
        <div class="chat-header-info">
          <div class="name">${chat.name}</div>
          <div class="status">${chat.status}</div>
        </div>
      `;

      const msgBox = document.getElementById('messages');
      msgBox.innerHTML = chat.messages.map(m => `
        <div class="message ${m.dir}">
          ${m.text}
          <div class="time">${m.time}</div>
        </div>
      `).join('');
      msgBox.scrollTop = msgBox.scrollHeight;

      document.getElementById('suggestions').innerHTML = chat.suggestions.map(s => `
        <div class="suggestion-chip" onclick="sendSuggestion(this, '${s.text.replace(/'/g, "\\'")}')">
          ${s.text}
          <span class="chip-delta ${deltaClass(s.delta)}">${deltaLabel(s.delta)}</span>
        </div>
      `).join('');

      renderScoreBar(chat.score);
      document.getElementById('msg-input').value = '';
    }

    function buildSidebar() {
      const list = document.getElementById('chat-list');
      list.innerHTML = chats.map((chat, idx) => `
        <div class="chat-item${idx === 0 ? ' active' : ''}" onclick="switchChat(this, ${idx})">
          ${avatarHTML(chat, 46)}
          <div class="chat-info">
            <div class="chat-name">${chat.name}</div>
            <div class="chat-preview">${chat.messages.at(-1).text}</div>
          </div>
        </div>
      `).join('');
    }

    function switchChat(el, idx) {
      document.querySelectorAll('.chat-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      render(idx);
    }

    function sendSuggestion(chip, text) {
      const input = document.getElementById('msg-input');
      input.value = text;
      input.focus();
      scoreMessage(text);
      chip.style.borderColor = '#4caf82';
      setTimeout(() => { chip.style.borderColor = '#2b5278'; }, 600);
    }

    // ── Message score bar ──
    function scoreMessage(text) {
      const fill    = document.getElementById('msg-score-fill');
      const display = document.getElementById('msg-score-display');

      if (!text.trim()) {
        // Empty input — reset to neutral
        fill.style.height     = '50%';
        fill.style.background = '#2b5278';
        display.textContent   = '—';
        display.style.color   = '#4a5a6a';
        return;
      }

      const t   = text.trim();
      let score = 0;

      // Length
      const len = t.length;
      if      (len < 3)   score -= 2.2;
      else if (len < 8)   score -= 0.8;
      else if (len <= 80) score += 1.5;
      else if (len <= 160) score += 0.6;
      else                score -= 0.4;

      // Asking a question = keeps conversation alive
      if (t.includes('?')) score += 1.2;

      // Emoji = warmth
      if (/\p{Emoji_Presentation}/u.test(t)) score += 0.5;

      // All caps = aggressive / shouting
      if (t.length > 3 && t === t.toUpperCase() && /[A-ZĄĆĘŁŃÓŚŹŻ]/.test(t)) score -= 1.5;

      // Dead-end one-word replies that kill conversations
      const deadEnds = ['ok', 'okej', 'dobra', 'spoko', 'tak', 'nie', 'aha', 'no', 'hm', 'mhm', 'okk'];
      if (deadEnds.includes(t.toLowerCase())) score -= 2.5;

      // Clamped to -5 / +5
      score = Math.max(-5, Math.min(5, score));

      const fillPct = 50 + (score / 5) * 45;
      fill.style.height = fillPct + '%';

      if (score >= 0) {
        fill.style.background = 'linear-gradient(to top, #8b0000, #ff4500, #ffa500)';
        display.style.color   = '#ffa500';
        display.textContent   = '+' + score.toFixed(1);
      } else {
        fill.style.background = 'linear-gradient(to top, #023e8a, #0077b6, #90e0ef)';
        display.style.color   = '#90e0ef';
        display.textContent   = score.toFixed(1);
      }
    }

    buildSidebar();
    render(0);
  </script>
