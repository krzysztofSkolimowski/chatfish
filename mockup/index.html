<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatfish — Mockups</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c2733;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 48px 32px;
    }

    header {
      margin-bottom: 48px;
    }
    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header p {
      margin-top: 6px;
      font-size: 14px;
      color: #8a9bb0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #17212b;
      border: 1px solid #1f2e3d;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .card:hover {
      border-color: #4db8ff;
      background: #1f2e3d;
    }

    .card-icon {
      font-size: 28px;
    }
    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: #fff;
    }
    .card-desc {
      font-size: 13px;
      color: #8a9bb0;
      line-height: 1.5;
    }
    .card-tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: #2b5278;
      color: #4db8ff;
      margin-top: 4px;
      width: fit-content;
    }

    /* Placeholder card for future mockups */
    .card.placeholder {
      border-style: dashed;
      opacity: 0.4;
      pointer-events: none;
    }
    .card.placeholder .card-title { color: #8a9bb0; }
  </style>
</head>
<body>

  <header>
    <h1>🐟 Chatfish — Mockups</h1>
    <p>UI prototypes and feature mockups</p>
  </header>

  <div class="grid">

    <a class="card" href="chat-overlay/index.html">
      <div class="card-icon">💬</div>
      <div class="card-title">Chat Overlay</div>
      <div class="card-desc">Telegram Web overlay showing AI reply suggestions and a Stockfish-style conversation score bar.</div>
      <div class="card-tag">Browser Extension</div>
    </a>

    <div class="card placeholder">
      <div class="card-icon">📊</div>
      <div class="card-title">Score Details</div>
      <div class="card-desc">Coming soon</div>
    </div>

    <div class="card placeholder">
      <div class="card-icon">⚙️</div>
      <div class="card-title">Settings Panel</div>
      <div class="card-desc">Coming soon</div>
    </div>

  </div>

</body>
</html>
